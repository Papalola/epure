<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Epure</title>
    <script>
      // GitHub Pages SPA redirect: stocke le path en sessionStorage et redirige vers /
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    </script>
  </head>
  <body></body>
</html>
